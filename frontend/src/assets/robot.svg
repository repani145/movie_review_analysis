<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#00b4ff" stop-opacity="1"/>
      <stop offset="1" stop-color="#0066ff" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(100,90)">
    <!-- body -->
    <rect x="-40" y="-8" rx="8" ry="8" width="80" height="72" fill="#0b1b2b" stroke="url(#g1)" stroke-width="1.6" filter="url(#glow)"/>

    <!-- head -->
    <g transform="translate(0,-40)">
      <rect x="-26" y="-22" rx="6" ry="6" width="52" height="44" fill="#0e2540" stroke="url(#g1)" stroke-width="1.4" filter="url(#glow)"/>
      <!-- eye -->
      <circle cx="-8" cy="0" r="4" fill="#00293b"/>
      <circle cx="8" cy="0" r="4" fill="#00e0ff" opacity="0.98">
        <animate attributeName="r" values="3.6;4.2;3.6" dur="2.6s" repeatCount="indefinite"/>
      </circle>
      <!-- mouth -->
      <rect x="-12" y="12" width="24" height="4" rx="2" fill="#073047"/>
    </g>

    <!-- antenna -->
    <g>
      <line x1="24" y1="-56" x2="36" y2="-74" stroke="#00c2ff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="36" cy="-74" r="4" fill="#00b4ff" opacity="0.95"/>
    </g>

    <!-- arms -->
    <g>
      <rect x="-60" y="-0" width="16" height="8" rx="3" fill="#0f2233" stroke="rgba(0,180,255,0.08)"/>
      <rect x="44" y="-0" width="16" height="8" rx="3" fill="#0f2233" stroke="rgba(0,180,255,0.08)"/>
    </g>

    <!-- legs -->
    <g>
      <rect x="-22" y="58" width="12" height="10" rx="2" fill="#071827"/>
      <rect x="10" y="58" width="12" height="10" rx="2" fill="#071827"/>
    </g>

    <!-- chest light -->
    <ellipse cx="0" cy="14" rx="18" ry="10" fill="url(#g1)" opacity="0.14"/>
    <circle cx="0" cy="14" r="6" fill="#00d4ff" opacity="0.95">
      <animate attributeName="r" values="5.4;7.2;5.4" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>